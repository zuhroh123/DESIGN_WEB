<!DOCTYPE html>
<html>
<head>
<title> From Absensi</title>
</head>
<body>
	<h2><u>Formulir Absensi Karyawan</u></h2>
	
	<form action="http://httpbin.org/post" method"post" target="_blank">
	<table>
	
	<tr>  
		<td>NIP</td>
		<td>: <input type="text" name="nip"></td>
	</tr>
	
	<tr>
		<td>Nama Karyawan</td>
		<td>: <input type="text" name="nama"></td>
	</tr>
	
	<tr>
		<td>Divisi</td>
		<td>:
			<select name= "divisi">
				<option value="">--pilih--</option>
				<option> Keuangan</option>
				<option>HRD</option>
				<option> IT</option>
				<option> Marketing</option>
			</select>
		</td>
	</tr>
	
	<tr>
		<td>Tanggal</td>
		<td>: <input type="date" name="tanggal"></td>
	</tr>
	
	<tr>
		<td>Jam Masuk</td>
		<td>: <input type="time" name="jam_masuk"></td>
	</tr>
	
	<tr>
		<td>Jam Keluar</td>
		<td>: <input type="time" name="jam_keluar"></td>
	</tr>
	
	<tr>
		<td>Status Kehadiran</td>
		<td>:
			<select name= "status">
				<option value="">--pilih--</option>
				<option> Hadir</option>
				<option>Izin</option>
				<option>Sakit</option>
				<option>Dinas Luar</option>
				<option>WFH</option>
			</select>
		</td>
	</tr>
	
	<tr>
		<td>Shift Kerja</td>
		<td>:
			<input type="radio" name="shift" value="Pagi"> Pagi
			<input type="radio" name="shift" value="Siang"> Siang
			<input type="radio" name="shift" value="Malam"> Malam
		</td>
	</tr>
	
	<tr>
		<td> Keterangan</td>
		<td>:
			<input type="checkbox" name="ket" value="Terlambat">Terlambat
			<input type="checkbox" name="ket" value="Lembur">Lembur
			<input type="checkbox" name="ket" value="Pulang Awal"> Pulang Awal
		</td>
	</tr>
	
	<tr>
		<td>catatan</td>
		<td>: <textarea name="catatan" rows="4" cols+"35"></textarea></td>
	</tr>
	
	<tr>
		<td></td>
		<td>
			<input type="submit" value="SUBMIT">
			<input type="reset" value="RESET">
		</td>
	</table>
	</form>
	</form>
	
</body>
</html>
